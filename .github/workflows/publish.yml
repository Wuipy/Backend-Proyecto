name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches: [master, josh]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Backend-Proyecto

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Configurar appsettings.Production.json
        shell: pwsh
        env:
          CONNECTION: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
          JWT_SECRET: ${{ secrets.JWT__SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN__CONTRASENA }}
          CORS_ORIGIN: ${{ secrets.CORS__ALLOWEDORIGINS__0 }}
        run: |
          if (-not $env:CONNECTION) { throw "Falta secret CONNECTIONSTRINGS__DEFAULTCONNECTION" }
          if (-not $env:JWT_SECRET) { throw "Falta secret JWT__SECRET" }
          if (-not $env:ADMIN_PASSWORD) { throw "Falta secret ADMIN__CONTRASENA" }
          if (-not $env:CORS_ORIGIN) { $env:CORS_ORIGIN = "https://sigasjiv.netlify.app" }

          $config = [ordered]@{
            Logging = [ordered]@{
              LogLevel = [ordered]@{
                Default = "Warning"
                "Microsoft.AspNetCore" = "Warning"
              }
            }
            AllowedHosts = "*"
            ConnectionStrings = [ordered]@{
              DefaultConnection = $env:CONNECTION
            }
            Jwt = [ordered]@{
              Secret = $env:JWT_SECRET
              Issuer = "SIGASJ"
              Audience = "SIGASJ-Frontend"
              ExpirationHours = 8
            }
            Admin = [ordered]@{
              Usuario = "admin"
              Contrasena = $env:ADMIN_PASSWORD
            }
            Cors = [ordered]@{
              AllowedOrigins = @(
                $env:CORS_ORIGIN,
                "https://sigasj.netlify.app",
                "http://sigasj.runasp.net",
                "http://localhost:5173",
                "http://127.0.0.1:5173"
              )
            }
          }

          $config | ConvertTo-Json -Depth 6 | Set-Content "appsettings.Production.json" -Encoding utf8
          Write-Host "appsettings.Production.json generado desde secrets (no commiteado)."

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x86 MonsterASP)
        run: dotnet publish --configuration Release --output ./publish --runtime win-x86

      - name: Validar Web Deploy antes de publicar
        shell: pwsh
        run: |
          if (-not "${{ secrets.WEBSITE_NAME }}") { throw "Falta secret WEBSITE_NAME" }
          if (-not "${{ secrets.SERVER_COMPUTER_NAME }}") { throw "Falta secret SERVER_COMPUTER_NAME" }
          if (-not "${{ secrets.SERVER_USERNAME }}") { throw "Falta secret SERVER_USERNAME" }
          if (-not "${{ secrets.SERVER_PASSWORD }}") { throw "Falta secret SERVER_PASSWORD" }

          $serverComputerName = "${{ secrets.SERVER_COMPUTER_NAME }}"
          if ($serverComputerName -match 'runasp\.net') {
            throw @"
          SERVER_COMPUTER_NAME incorrecto: usa siteasp.net (Web Deploy), NO runasp.net (sitio publico).

          Valor correcto:
            https://site75093.siteasp.net:8172

          Valores INCORRECTOS (no resuelven DNS):
            https://sigasj.runasp.net:8172
            https://site75093.runasp.net:8172
          "@
          }

          Write-Host "Comprobando DNS de site75093.siteasp.net..."
          Resolve-DnsName site75093.siteasp.net -ErrorAction Stop | Out-Null
          Write-Host "DNS OK. Publicando a MonsterASP..."

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
          source-path: '\Backend-Proyecto\publish\'

      - name: Verificar API en produccion
        shell: pwsh
        run: |
          Start-Sleep -Seconds 15
          $response = Invoke-RestMethod -Uri "http://sigasj.runasp.net/api/health" -TimeoutSec 30
          Write-Host ($response | ConvertTo-Json -Compress)
          if ($response.status -ne "ok") { throw "Health check fallo" }
